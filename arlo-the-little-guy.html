<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arlo the Little Guy Wiki</title>
    <link rel="icon" type="image/x-icon" href="bowler_hat.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>

        @font-face {

        .search-container {

        .search-suggestions {

        .nav-tabs {

            display: flex;

            .nav-scroll-wrapper {
                padding: 0 20px;

        .nav-button {
            background: #4baa39;
            border: 2px solid #3d892a;
            border-bottom: none;
            margin-right: 2px;
            cursor: pointer;
            font-size: 14px;
            color: white;
            font-family: 'Minecraft Ten', 'Inter', sans-serif;
            font-weight: 6000;
            text-shadow: 2px 2px 0px rgba(87, 149, 50, 0.8);
            box-shadow:
                inset 2px 2px 0 #50b945,
                inset -2px -2px 0 #449930;
            text-decoration: none;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 20px;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .nav-button:last-child {
            margin-right: 0;
        }

        .nav-button:hover {
            background: #3d892a;
        }

        .nav-button.active {
            background: #3d892a;
        }

        .nav-button.hidden {
            display: none;
        }

        .nav-button.nav-arrow img {
            border: none;
            width: 35px
        }

        .nav-button img {
            width: 16px;
            height: 16px;
            image-rendering: auto;
            border: 1px solid #347623;
        }

        .nav-button-text {
            display: inline;
        }

        .nav-button-icon {
            display: inline-block;
            margin-right: 6px;
            order: -1;
        }

        .nav-button-icon {
            width: 23px !important;
            height: 23px !important;
            border: 2px solid #347623 !important;
            image-rendering: -moz-crisp-edges !important;
            image-rendering: -webkit-crisp-edges !important;
            image-rendering: pixelated !important;
            image-rendering: crisp-edges !important;
        }

        @media (max-width: 768px) {
            .nav-button-icon {
                display: block;
                width: 20px;
                height: 20px;
                border: 1px solid #0a4694;
                margin-right: 0;
            }

            .nav-button {
                padding: 10px 4px;
                font-size: 11px;
            }

            .nav-button img {
                width: 25px;
                height: 25px;
                image-rendering: auto;
                border: 2px solid #347623;
            }

            .nav-button-text {
                display: none;
            }

            .nav-button-icon {
                display: block;
                width: 20px;
                height: 20px;
                border: 1px solid #347623;
            }
        }

        .main-container {
            max-width: 1400px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                margin: 20px 15px;
                padding: 0;
                gap: 20px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                margin: 15px 10px;
            }
        }

        .content {
            background: #262626;
            border: none;
            border-radius: 0;
            padding: 25px;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 15px;
            }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-section {
            background: #262626;
            border: none;
            border-radius: 0;
            padding: 20px;
        }

        .stats {
            background: linear-gradient(135deg, #4baa39, #3d892a);
            border-radius: 0;
            padding: 20px;

            color: white;
        }

        .stats img {
            filter: brightness(1.2);
        }

        .stat-number {
            font-size: 28px;
            font-weight: normal;
            display: block;
            font-family: 'Minecraft Ten', 'Inter', sans-serif;
        }

        .stat-label {

        }

        .page-title {

        }

        .content-section {

        }

        @media (max-width: 768px) {

                margin-bottom: 25px;

        }

        @media (max-width: 480px) {
            .content-section {
                margin-bottom: 20px;
            }
        }

            width: 90%;
            height: auto;
            display: block;
            margin: 20px auto;
        }

        .biome-text {
            text-align: center;
            font-size: 18px;
            color: #cccccc;
            margin: 20px 0;
            font-family: 'Nunito', sans-serif;
            border-top: 2px solid #4a4a4a;

        }

        @media (max-width: 480px) {

        }

        h1, h2,
        .page-title {

</head>
<body>
<div class="header">
    <div class="header-content">
        <div class="logo">
            <a href="https://potatowolfie.github.io">
                <img src="Arlo_The_Little_Guy/assets/arlo_the_little_guy.png" alt="Arlo the Little Guy Wiki">
            </a>
        </div>
    </div>
</div>

<div class="nav-tabs">
    <div class="nav-scroll-wrapper" id="navWrapper">
    </div>
</div>

<div class="main-container">
    <div class="content">
        <h1 class="page-title">Arlo the Little Guy</h1>

        <div class="content-section">
            <img src="Arlo_The_Little_Guy/assets/painting.png" alt="No Biomes Here" class="biome-image">
            <div class="biome-text">Arlo the Little Guy at the current 
                moment does not have a complete wiki.</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-section stats">
            <div class="stat-number" id="downloadCount">---</div>
            <div class="stat-label">Downloads</div>
        </div>
    </div>
</div>

<script>
    let searchData = {};
    let allSearchItems = [];

    async function loadSearchData() {
        try {
            const response = await fetch('search-data-mods.json');
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            searchData = await response.json();
            allSearchItems = Object.values(searchData).flat();
            console.log('Search data loaded successfully');
        } catch (error) {
            console.error('Error loading search data:', error);
            searchData = {};
            allSearchItems = [];
        }
    }

let dynamicNavTabs = [];
let currentPage = 0;

async function loadNavigationTabs() {
    try {
        const cacheBuster = new Date().getTime();
        const response = await fetch(`navtabs.json?v=${cacheBuster}`, {
            cache: 'no-store',
            headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });

        if (response.ok) {
            dynamicNavTabs = await response.json();
            renderNavigation();
            console.log('Successfully loaded paginated tabs from navtabs.json');
        }
    } catch (error) {
        console.error('Error loading navigation tabs:', error);
    }
}

function getButtonWidth() {
    let availableWidth;
    if (window.innerWidth <= 768) {
        const mainContainer = document.querySelector('.main-container');
        const containerWidth = mainContainer ? mainContainer.offsetWidth : window.innerWidth - 30;
        const totalMargins = 5 * 2;
        return (containerWidth - totalMargins) / 6;
    } else {
        availableWidth = window.innerWidth - 40;
        const totalMargins = 7 * 2;
        return (availableWidth - totalMargins) / 8;
    }
}

function renderNavigation() {
    const wrapper = document.getElementById('navWrapper');
    if (!wrapper) return;

    const buttonWidth = getButtonWidth();
    const buttonsPerPage = window.innerWidth <= 768 ? 6 : 8;

    const currentFilename = window.location.pathname.split('/').pop() || 'index.html';

    wrapper.innerHTML = '';
    let buttons = [];

    if (dynamicNavTabs.length <= buttonsPerPage) {
        buttons = dynamicNavTabs.map(tab => ({ type: 'tab', data: tab }));
    } else {
        if (currentPage === 0) {
            for (let i = 0; i < buttonsPerPage - 1 && i < dynamicNavTabs.length; i++) {
                buttons.push({ type: 'tab', data: dynamicNavTabs[i] });
            }
            buttons.push({ type: 'next' });
        } else {
            const firstPageTabs = buttonsPerPage - 1;
            const otherPageTabs = buttonsPerPage - 2;
            const startIndex = firstPageTabs + (currentPage - 1) * otherPageTabs;

            const remainingTabs = dynamicNavTabs.length - startIndex;
            const isLastPage = remainingTabs <= buttonsPerPage - 1;

            if (isLastPage) {
                buttons.push({ type: 'prev' });
                for (let i = startIndex; i < dynamicNavTabs.length; i++) {
                    buttons.push({ type: 'tab', data: dynamicNavTabs[i] });
                }
            } else {
                buttons.push({ type: 'prev' });
                for (let i = startIndex; i < startIndex + otherPageTabs && i < dynamicNavTabs.length; i++) {
                    buttons.push({ type: 'tab', data: dynamicNavTabs[i] });
                }
                buttons.push({ type: 'next' });
            }
        }
    }

    buttons.forEach(button => {
        const btn = document.createElement('a');
        btn.className = 'nav-button';
        btn.style.width = buttonWidth + 'px';

        if (button.type === 'prev') {
            btn.classList.add('nav-arrow');
            btn.innerHTML = `
                <span class="nav-button-text">Previous</span>
                <img src="assets/buttons/next_arrow.png" alt="←" style="transform: scaleX(-1);" class="nav-button-icon">
            `;
            btn.onclick = (e) => {
                e.preventDefault();
                if (currentPage > 0) {
                    currentPage--;
                    renderNavigation();
                }
            };
        } else if (button.type === 'next') {
            btn.classList.add('nav-arrow');
            btn.innerHTML = `
                <span class="nav-button-text">Next</span>
                <img src="assets/buttons/next_arrow.png" alt="→" class="nav-button-icon">
            `;
            btn.onclick = (e) => {
                e.preventDefault();
                currentPage++;
                renderNavigation();
            };
        } else {
            btn.href = button.data.html_name;
            btn.innerHTML = `
                <span class="nav-button-text">${button.data.name}</span>
                <img src="${button.data.logo}" alt="${button.data.name}" class="nav-button-icon">
            `;
            if (button.data.html_name === currentFilename) {
                btn.classList.add('active');
            }
        }
        wrapper.appendChild(btn);
    });

    initializeNavButtonEffects();
}

function initializeNavButtonEffects() {
    document.querySelectorAll('.nav-button').forEach(button => {
        button.onmousedown = function() { this.classList.add('pressed'); };
        button.onmouseup = function() { this.classList.remove('pressed'); };
        button.onmouseleave = function() { this.classList.remove('pressed'); };
    });
}

    async function fetchDownloadCount() {
        try {
            let modrinthDownloads = 0;
            let curseforgeDownloads = 0;

            try {
                const modrinthResponse = await fetch('https://api.modrinth.com/v2/project/arlo-the-little-guy', {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache'
                    }
                });

                if (modrinthResponse.ok) {
                    const modrinthData = await modrinthResponse.json();
                    modrinthDownloads = modrinthData.downloads || 0;
                    console.log('Modrinth downloads:', modrinthDownloads);
                }
            } catch (error) {
                console.warn('Could not fetch Modrinth downloads:', error);
            }

            try {
                const curseforgeProjectId = '1448777';
                const cfResponse = await fetch(
                    `https://api.cfwidget.com/minecraft/mc-mods/${curseforgeProjectId}`
                );

                if (cfResponse.ok) {
                    const cfData = await cfResponse.json();
                    curseforgeDownloads = cfData.downloads?.total || 0;
                    console.log('CurseForge downloads:', curseforgeDownloads);
                }
            } catch (error) {
                console.warn('Could not fetch CurseForge downloads:', error);
            }

            const totalDownloads = modrinthDownloads + curseforgeDownloads;

            console.log('Total downloads:', totalDownloads);

            updateDownloadCounter(totalDownloads, modrinthDownloads, curseforgeDownloads);

        } catch (error) {
            console.error('Error fetching download count:', error);
            updateDownloadCounter(null);
        }
    }

    function updateDownloadCounter(total, modrinth, curseforge) {
        const countElement = document.getElementById('downloadCount');

        if (!countElement) return;

        if (total !== null) {
            countElement.innerHTML = formatNumber(total);

            countElement.title = `Modrinth: ${formatNumber(modrinth)}\nCurseForge: ${formatNumber(curseforge)}`;

            const label = countElement.nextElementSibling;
            if (label && label.classList.contains('stat-label')) {
                label.textContent = 'Total Downloads';
            }
        } else {
            countElement.textContent = '---';
        }
    }

    function formatNumber(num) {
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1) + 'M';
        } else if (num >= 1000) {
            return (num / 1000).toFixed(1) + 'K';
        }
        return num.toLocaleString();
    }

    document.addEventListener('DOMContentLoaded', async function() {
        await loadSearchData();
        loadNavigationTabs();

        window.addEventListener('resize', function() {
        if (dynamicNavTabs.length > 0) {
            renderNavigation();
        }
    });

        fetchDownloadCount();
        setInterval(fetchDownloadCount, 5 * 60 * 1000);

    });
</script>
